name: zardoz
description: "Zardoz - Embroidery Design Sharing & Projection"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  provider: ^6.1.0
  image_picker: ^1.1.0
  cached_network_image: ^3.4.0
  shared_preferences: ^2.3.0
  xml: ^6.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/title.png
    - assets/logo.png
    - assets/logo-square.png
